<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>Historija</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* 📅 KALENDAR */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 400px;
  margin: 20px auto;
}

.day {
  padding: 10px;
  background: #1e293b;
  cursor: pointer;
  border-radius: 6px;
}

.day:hover {
  background: #334155;
}

.day.selected {
  background: #22c55e;
  color: black;
  font-weight: bold;
}

/* 📊 BOX */
.box {
  background: #1e293b;
  padding: 15px;
  margin: 10px auto;
  width: 300px;
  border-radius: 10px;
}

</style>
</head>

<body>

<h2>📅 Historija po danima</h2>

<select id="machine">
  <option value="masina_01">Masina 01</option>
  <option value="masina_02">Masina 02</option>
  <option value="masina_03">Masina 03</option>
  <option value="masina_04">Masina 04</option>
  <option value="masina_05">Masina 05</option>
</select>

<div class="calendar" id="calendar"></div>

<div id="result"></div>

<script>
const calendar = document.getElementById("calendar");
const result = document.getElementById("result");
const machineSelect = document.getElementById("machine");

let selectedDay = null;

// 📅 GENERATE DAYS
function generateCalendar() {
  calendar.innerHTML = "";

  for (let i = 1; i <= 31; i++) {
    const div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    div.onclick = () => selectDay(i, div);

    calendar.appendChild(div);
  }
}

// 📅 SELECT DAY
function selectDay(day, element) {

  // remove old highlight
  document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));

  element.classList.add("selected");
  selectedDay = day;

  loadData();
}

// 📊 LOAD DATA
async function loadData() {

  if (!selectedDay) return;

  const machine = machineSelect.value;

  const date = new Date();
  date.setDate(selectedDay);

  const yyyy = date.getFullYear();
  const mm = String(date.getMonth()+1).padStart(2,'0');
  const dd = String(selectedDay).padStart(2,'0');

  const fullDate = `${yyyy}-${mm}-${dd}`;

  try {
    const res = await fetch(`/api/day-shift-stats?machine=${machine}&date=${fullDate}`);
    const data = await res.json();

    render(data);

  } catch (err) {
    console.log(err);
    result.innerHTML = "Greška!";
  }
}

// 📊 FORMAT TIME
function format(sec){
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  return `${h}h ${m}m`;
}

// 📊 RENDER
function render(data){

  result.innerHTML = "";

  ["I","II","III"].forEach(shift => {

    const s = data[shift];

    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <h3>Smjena ${shift}</h3>
      RAD: ${format(s.RAD)}<br>
      PRIPREMA: ${format(s.PRIPREMA)}<br>
      ZASTOJ: ${format(s.ZASTOJ)}<br>
      NEAKTIVNA: ${format(s.NEAKTIVNA)}<br>
      <b>Efikasnost: ${s.efficiency}%</b>
    `;

    result.appendChild(div);
  });
}

// INIT
generateCalendar();

</script>

</body>
</html>
