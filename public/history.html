<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Historija</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .shift-card {
      padding: 15px;
      margin-top: 15px;
    }

    .calendar-day {
      cursor: pointer;
      transition: 0.2s;
      min-height: 90px;
    }

    .calendar-day:hover {
      transform: scale(1.05);
    }

    /* GRID kalendar */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .calendar-header {
      font-weight: bold;
      text-align: center;
    }

    .empty-day {
      visibility: hidden;
    }

    /* AKTIVNI DAN */
    .active-day {
      border: 3px solid #0d6efd;
      transform: scale(1.05);
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <div class="mb-3">
    <a href="/" class="btn btn-secondary">⬅️ Početna</a>
  </div>

  <h1>📅 Historija mašine</h1>

  <div class="row mb-3">

    <div class="col-md-4">
      <select id="machine" class="form-select" onchange="reloadAll()">
        <option value="masina_01">masina_01</option>
        <option value="masina_02">masina_02</option>
        <option value="masina_03">masina_03</option>
        <option value="masina_04">masina_04</option>
        <option value="masina_05">masina_05</option>
        <option value="masina_06">masina_06</option>
        <option value="masina_07">masina_07</option>
        <option value="masina_08">masina_08</option>
        <option value="masina_09">masina_09</option>
        <option value="masina_10">masina_10</option>
      </select>
    </div>

    <div class="col-md-4">
      <input type="date" id="date" class="form-control" onchange="reloadAll()">
    </div>

    <div class="col-md-4">
      <button class="btn btn-primary w-100" onclick="searchAll()">
        🔍 Prikaži
      </button>
    </div>

  </div>

  <h3>📅 Kalendar</h3>
  <div class="calendar-grid" id="calendar"></div>

  <div id="result"></div>

</div>

<script>
const DAY_API = "/api/day-shift-stats";
const MONTH_API = "/api/month-stats";

let selectedDay = null;

// =======================
// FORMAT
// =======================
function formatTime(sec) {
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  let s = sec%60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

// =======================
// 📊 DAN
// =======================
async function loadData(dateOverride = null) {
  const machine = document.getElementById("machine").value;
  const date = dateOverride || document.getElementById("date").value;

  if (!date) return;

  selectedDay = new Date(date).getDate();
  document.getElementById("date").value = date;

  const res = await fetch(`${DAY_API}?date=${date}&machine=${machine}`);
  const data = await res.json();

  const div = document.getElementById("result");
  div.innerHTML = "";

  for (let s in data) {
    const d = data[s];

    div.innerHTML += `
      <div class="card shift-card">
        <h3>${s} smjena</h3>

        <div>🟢 RAD: ${formatTime(d.RAD)}</div>
        <div>🟠 PRIPREMA: ${formatTime(d.PRIPREMA)}</div>
        <div>🔴 ZASTOJ: ${formatTime(d.ZASTOJ)}</div>
        <div>⚫ NEAKTIVNA: ${formatTime(d.NEAKTIVNA)}</div>

        <div style="margin-top:10px; font-weight:bold;">
          ⚙️ Efikasnost: ${d.efficiency}%
        </div>
      </div>
    `;
  }

  loadMonth();
}

// =======================
// 📅 MJESEC (SEDMICE)
// =======================
async function loadMonth() {
  const machine = document.getElementById("machine").value;
  const date = document.getElementById("date").value;

  if (!date) return;

  const d = new Date(date);
  const year = d.getFullYear();
  const month = d.getMonth();

  let data = {};

  try {
    const res = await fetch(`${MONTH_API}?machine=${machine}&year=${year}&month=${month+1}`);
    data = await res.json();
  } catch (e) {
    console.log(e);
  }

  const container = document.getElementById("calendar");
  container.innerHTML = "";

  // HEADER
  const daysHeader = ["Pon","Uto","Sri","Čet","Pet","Sub","Ned"];
  daysHeader.forEach(d => {
    const el = document.createElement("div");
    el.className = "calendar-header";
    el.innerText = d;
    container.appendChild(el);
  });

  const firstDay = new Date(year, month, 1);
  let startDay = firstDay.getDay();
  startDay = (startDay === 0) ? 6 : startDay - 1;

  // prazni slotovi
  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement("div");
    empty.className = "empty-day";
    container.appendChild(empty);
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 1; i <= daysInMonth; i++) {

    const day = data[i] || { RAD: 0, eff: 0 };

    const color =
      day.eff > 70 ? "#d4edda" :
      day.eff > 40 ? "#fff3cd" :
      "#f8d7da";

    const isActive = (i === selectedDay);

    const div = document.createElement("div");

    div.innerHTML = `
      <div class="card calendar-day text-center p-2 ${isActive ? "active-day" : ""}"
           style="background:${color}"
           onclick="selectDay(${i})">

        <strong>${i}</strong>

        <div style="font-size:12px">
          ${formatTime(day.RAD)}
        </div>

        <div style="font-size:12px; font-weight:bold;">
          ${day.eff || 0}%
        </div>
      </div>
    `;

    container.appendChild(div);
  }
}

// =======================
// 🖱️ SELECT
// =======================
function selectDay(day) {
  const d = new Date(document.getElementById("date").value);
  d.setDate(day);

  const iso = d.toISOString().split("T")[0];

  loadData(iso);
}

// =======================
// 🔍 BUTTON FIX
// =======================
function searchAll() {
  selectedDay = new Date(document.getElementById("date").value).getDate();
  loadMonth();
  loadData();
}

// =======================
// 🔁 RELOAD
// =======================
function reloadAll() {
  searchAll();
}

// =======================
// INIT
// =======================
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;
selectedDay = new Date().getDate();

loadMonth();
loadData();
</script>

</body>
</html>
