<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mašina Dashboard</title>

  <!-- Tabler CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="layout-fluid">

<div class="page">
  <div class="container-xl">

    <h1 class="mt-4 mb-4">🏭 Dashboard mašine</h1>

    <!-- STATUS CARD -->
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-body text-center">
            <h3 id="status">Učitavanje...</h3>
            <div id="timer" class="text-muted"></div>
            <div id="alarm" class="text-danger mt-2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- CHART -->
    <div class="row mt-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Statistika</h3>
          </div>
          <div class="card-body">
            <canvas id="chart"></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API_DATA = "/api/data";
const API_STATS = "/api/stats";

let chart;
let currentStartTime = null;

// 🎨 boje
function getColor(state) {
  if (state === "RAD") return "green";
  if (state === "ZASTOJ") return "red";
  if (state === "PRIPREMA") return "orange";
  return "gray";
}

// 🟢 LIVE STATUS
async function loadLive() {
  const res = await fetch(API_DATA);
  const data = await res.json();

  if (!data || data.length === 0) return;

  const current = data[0];

  document.getElementById("status").innerHTML =
    `<span style="color:${getColor(current.state)}">
      ${current.state}
    </span>`;

  currentStartTime = new Date(current.created_at);

  // alarm
  if (current.state === "ZASTOJ") {
    document.getElementById("alarm").innerText = "⚠️ ZASTOJ!";
  } else {
    document.getElementById("alarm").innerText = "";
  }
}

// ⏱️ TIMER
setInterval(() => {
  if (!currentStartTime) return;

  const diff = Math.floor((new Date() - currentStartTime) / 1000);
  document.getElementById("timer").innerText = `Trajanje: ${diff}s`;
}, 1000);

// 📊 STATISTIKA
async function loadStats() {
  const res = await fetch(API_STATS);
  const data = await res.json();

  const labels = data.map(d => d.state);
  const values = data.map(d => Number(d.total_duration));

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Vrijeme (s)",
        data: values
      }]
    }
  });
}

// 🔄 REFRESH
setInterval(loadLive, 5000);
setInterval(loadStats, 10000);

// START
window.onload = () => {
  loadLive();
  loadStats();
};
</script>

</body>
</html>
