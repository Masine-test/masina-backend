<!DOCTYPE html>
<html>
<head>
  <title>Mašina Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h2 {
      margin: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .status {
      font-size: 28px;
      font-weight: bold;
    }

    .timer {
      font-size: 22px;
      margin-top: 10px;
    }

    .alarm {
      color: red;
      font-weight: bold;
      margin-top: 10px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>🏭 Dashboard mašine</h2>

<div class="card">
  <div id="status" class="status">Učitavanje...</div>
  <div id="timer" class="timer"></div>
  <div id="alarm" class="alarm"></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
const API_DATA = "/api/data";
const API_STATS = "/api/stats";

let chart;
let currentStartTime = null;

// 🎨 boje
function getColor(state) {
  if (state === "RAD") return "lime";
  if (state === "ZASTOJ") return "red";
  if (state === "PRIPREMA") return "orange";
  return "gray";
}

// 📊 GRAF
async function loadStats() {
  const res = await fetch(API_STATS);
  const data = await res.json();

  const labels = data.map(d => d.state);
  const values = data.map(d => Number(d.total_duration));

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Vrijeme (s)",
        data: values
      }]
    }
  });
}

// 🟢 LIVE STATUS
async function loadLive() {
  const res = await fetch(API_DATA);
  const data = await res.json();

  if (!data || data.length === 0) return;

  const current = data[0];

  // status
  document.getElementById("status").innerHTML =
    `<span style="color:${getColor(current.state)}">
      ${current.state}
    </span>`;

  // vrijeme početka
  currentStartTime = new Date(current.created_at);

  // alarm
  if (current.state === "ZASTOJ") {
    document.getElementById("alarm").innerHTML = "⚠️ ZASTOJ!";
  } else {
    document.getElementById("alarm").innerHTML = "";
  }
}

// ⏱️ LIVE TIMER
setInterval(() => {
  if (!currentStartTime) return;

  const now = new Date();
  const diff = Math.floor((now - currentStartTime) / 1000);

  document.getElementById("timer").innerText =
    `Trajanje: ${diff}s`;
}, 1000);

// 🔄 REFRESH
setInterval(loadLive, 5000);
setInterval(loadStats, 10000);

// START
window.onload = () => {
  loadLive();
  loadStats();
};
</script>

</body>
</html>
