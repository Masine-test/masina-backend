<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 16px;
      color: gray;
    }

    .offline {
      color: gray;
    }

    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }

    /* 🔥 BLINK za OFFLINE */
    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <h1>🏭 Sve mašine</h1>

  <div class="row" id="machines"></div>

</div>
<script>
const API = "/api/machines/all";

let startTimes = {};
let lastStates = {};

// 🎯 BOJE
function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}
// Format vremena
function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  return (
    String(h).padStart(2, "0") + ":" +
    String(m).padStart(2, "0") + ":" +
    String(s).padStart(2, "0")
  );
}

//Smjene
  function getShift(hour) {
  if (hour >= 7 && hour < 16) {
    return "I smjena (07-16h)";
  }
  if (hour >= 16 && hour < 24) {
    return "II smjena (16-24h)";
  }
  return "III smjena (00-07h)";
}

//Update vremana
  function updateDateTime() {
  const now = new Date();

  const dateStr = now.toLocaleDateString();
  const timeStr = now.toLocaleTimeString();

  document.getElementById("datetime").innerText =
    `${dateStr} ${timeStr}`;

  document.getElementById("shift").innerText =
    getShift(now.getHours());
}
  
// 🎯 LABEL
function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}
async function loadMachines() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("machines");

  data.forEach(m => {

    let card = document.getElementById("card_" + m.machine_id);

    // 🆕 ako ne postoji → kreiraj
    if (!card) {
      const div = document.createElement("div");
      div.className = "col-md-3";
      div.id = "card_" + m.machine_id;

      div.innerHTML = `
        <div class="card machine-card">
          <h3>${m.machine_id}</h3>

          <div class="status" id="s_${m.machine_id}"></div>

          <div style="font-size:12px; color:gray;" id="st_${m.machine_id}"></div>

          <div class="timer" id="t_${m.machine_id}"></div>
        </div>
      `;

      container.appendChild(div);
    }

    // 🔥 UPDATE (bez brisanja)
    const statusEl = document.getElementById("s_" + m.machine_id);
    const labelEl = document.getElementById("st_" + m.machine_id);

    statusEl.className = "status " + getClass(m.state, m.status);

    statusEl.innerHTML = `
      <span class="${m.status === 'OFFLINE' ? 'blink' : ''}">
        ${getLabel(m.state, m.status)}
      </span>
    `;

    labelEl.innerText = m.status;

    // ⏱️ TIMER RESET LOGIKA
    if (m.status !== "NEVER") {
      if (lastStates[m.machine_id] !== (m.state + m.status)) {
        startTimes[m.machine_id] = new Date(m.last_seen || Date.now());
        lastStates[m.machine_id] = m.state + m.status;
      }
    }
  });
}


// ⏱️ TIMER (radi samo za aktivne)
setInterval(() => {
  for (let id in startTimes) {
    if (!startTimes[id]) continue;

    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);

    if (el) el.innerText = `Trajanje: ${formatTime(diff)}`;
  }
}, 1000);

// 🔄 refresh
setInterval(loadMachines, 5000);
window.onload = loadMachines;

setInterval(updateDateTime, 1000);
updateDateTime();  
  
</script>
<div class="row mb-3">
  <div class="col-md-12 text-center">
    <h3 id="datetime"></h3>
    <h4 id="shift"></h4>
  </div>
</div>
</body>
</html>
