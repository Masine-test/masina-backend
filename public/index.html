<script>
const STATS_API = "/api/shift-stats";
const API = "/api/machines/all";

let startTimes = {};
let lastStates = {};
let shiftStartGlobal = null;

// format
function formatTime(seconds) {
  seconds = Math.floor(seconds || 0);

  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}

function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}

async function loadMachines() {
  const res = await fetch(API);
  const machines = await res.json();

  const statsRes = await fetch(STATS_API);
  const statsJson = await statsRes.json();

  const stats = statsJson.data;
  const shiftStart = new Date(statsJson.shiftStart);

  shiftStartGlobal = shiftStart;

  const container = document.getElementById("machines");

  machines.forEach(m => {

    let s = stats[m.machine_id] || {};

    // 🔥 RESET AKO JE STARI STATE
    if (m.created_at) {
      const lastChange = new Date(m.created_at);

      if (lastChange < shiftStart) {
        s = { RAD: 0, PRIPREMA: 0, ZASTOJ: 0, efficiency: 0 };
      }
    }

    const rad = formatTime(s.RAD);
    const priprema = formatTime(s.PRIPREMA);
    const zastoj = formatTime(s.ZASTOJ);
    const eff = s.efficiency || 0;

    let card = document.getElementById("card_" + m.machine_id);

    if (!card) {
      const div = document.createElement("div");
      div.className = "col-md-3";
      div.id = "card_" + m.machine_id;

      div.innerHTML = `
        <div class="card machine-card">
          <h3>${m.machine_id}</h3>

          <div class="status" id="s_${m.machine_id}"></div>
          <div id="st_${m.machine_id}"></div>
          <div class="timer" id="t_${m.machine_id}"></div>

          <div class="stats">
            🟢 RAD: <span id="rad_${m.machine_id}"></span><br>
            🟠 PRIPREMA: <span id="prep_${m.machine_id}"></span><br>
            🔴 ZASTOJ: <span id="zast_${m.machine_id}"></span>
          </div>

          <div class="eff" id="eff_${m.machine_id}"></div>
        </div>
      `;

      container.appendChild(div);
    }

    document.getElementById("s_" + m.machine_id).className =
      "status " + getClass(m.state, m.status);

    document.getElementById("s_" + m.machine_id).innerText =
      getLabel(m.state, m.status);

    document.getElementById("st_" + m.machine_id).innerText = m.status;

    document.getElementById("rad_" + m.machine_id).innerText = rad;
    document.getElementById("prep_" + m.machine_id).innerText = priprema;
    document.getElementById("zast_" + m.machine_id).innerText = zastoj;
    document.getElementById("eff_" + m.machine_id).innerText = `⚙️ ${eff}%`;

    // TIMER
    if (m.created_at) {
      if (lastStates[m.machine_id] !== (m.state + m.status)) {
        startTimes[m.machine_id] = new Date(m.created_at);
        lastStates[m.machine_id] = m.state + m.status;
      }
    }
  });
}

// timer
setInterval(() => {
  for (let id in startTimes) {
    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);
    if (el) el.innerText = "Trajanje: " + formatTime(diff);
  }
}, 1000);

setInterval(loadMachines, 5000);
window.onload = loadMachines;
</script>
