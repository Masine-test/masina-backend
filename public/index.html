<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 16px;
      color: gray;
      min-height: 20px; /* 🔥 sprječava skakanje */
    }

    .offline { color: gray; }
    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }

    .stats {
      font-size: 13px;
      margin-top: 10px;
      text-align: left;
    }

    .eff {
      margin-top: 10px;
      font-weight: bold;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <!-- HEADER -->
  <div class="row mb-3">
    <div class="col-md-6">
      <h1>🏭 Sve mašine</h1>
    </div>

    <div class="col-md-6 text-end">
      <a href="/history.html" class="btn btn-primary">
        📅 Historija
      </a>
    </div>
  </div>

  <!-- DATUM + SMJENA -->
  <div class="row mb-3 text-center">
    <h3 id="datetime"></h3>
    <h4 id="shift"></h4>
  </div>

  <!-- KARTICE -->
  <div class="row" id="machines"></div>

</div>

<script>
const API = "/api/machines/all";
const STATS_API = "/api/shift-stats";

let startTimes = {};
let lastStates = {};

// 🎨 boje
function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}

// 🏷️ label
function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}

// ⏱️ format vremena
function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

// 🕐 smjena
function getShift(hour) {
  if (hour >= 7 && hour < 16) return "I smjena (07-16h)";
  if (hour >= 16) return "II smjena (16-24h)";
  return "III smjena (00-07h)";
}

// 🕐 vrijeme + smjena
function updateDateTime() {
  const now = new Date();

  document.getElementById("datetime").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  document.getElementById("shift").innerText =
    getShift(now.getHours());
}

// 🚀 MAIN LOAD
async function loadMachines() {
  const res = await fetch(API);
  const data = await res.json();

  // const statsRes = await fetch(STATS_API);
  // const stats = await statsRes.json();
  let stats = {};

try {
  const statsRes = await fetch(STATS_API);
const statsJson = await statsRes.json();

const stats = statsJson.data;
const shiftStart = new Date(statsJson.shiftStart);
} catch (e) {
  console.log("Stats API error:", e);
}

  const container = document.getElementById("machines");

  data.forEach(m => {

    const s = stats[m.machine_id] || {};

    const rad = formatTime(s.RAD || 0);
    const priprema = formatTime(s.PRIPREMA || 0);
    const zastoj = formatTime(s.ZASTOJ || 0);
    const eff = s.efficiency || 0;

    let card = document.getElementById("card_" + m.machine_id);

    // 🆕 CREATE
    if (!card) {
      const div = document.createElement("div");
      div.className = "col-md-3";
      div.id = "card_" + m.machine_id;

      div.innerHTML = `
        <div class="card machine-card">
          <h3>${m.machine_id}</h3>

          <div class="status" id="s_${m.machine_id}"></div>
          <div style="font-size:12px; color:gray;" id="st_${m.machine_id}"></div>

          <div class="timer" id="t_${m.machine_id}">--:--:--</div>

          <div class="stats" id="stats_${m.machine_id}"></div>
          <div class="eff" id="eff_${m.machine_id}"></div>
        </div>
      `;

      container.appendChild(div);
    }

    // 🔄 UPDATE STATUS
    const statusEl = document.getElementById("s_" + m.machine_id);
    const labelEl = document.getElementById("st_" + m.machine_id);
    const statsEl = document.getElementById("stats_" + m.machine_id);
    const effEl = document.getElementById("eff_" + m.machine_id);

    statusEl.className = "status " + getClass(m.state, m.status);

    statusEl.innerHTML = `
      <span class="${m.status === 'OFFLINE' ? 'blink' : ''}">
        ${getLabel(m.state, m.status)}
      </span>
    `;

    labelEl.innerText = m.status;

    // 📊 UPDATE STATS (bez reload kartice)
    statsEl.innerHTML = `
      🟢 RAD: ${rad}<br>
      🟠 PRIPREMA: ${priprema}<br>
      🔴 ZASTOJ: ${zastoj}
    `;

    effEl.innerText = `⚙️ Efikasnost: ${eff}%`;

    // ⏱️ TIMER RESET (FIXED)
    if (
  !startTimes[m.machine_id] ||
  startTimes[m.machine_id] < shiftStart ||
  lastStates[m.machine_id] !== (m.state + m.status)
) {
  startTimes[m.machine_id] = new Date(
    m.created_at && new Date(m.created_at) > shiftStart
      ? m.created_at
      : shiftStart
  );

  lastStates[m.machine_id] = m.state + m.status;
}
  });
}

// ⏱️ TIMER LIVE
setInterval(() => {
  for (let id in startTimes) {
    const el = document.getElementById("t_" + id);
    if (!el) continue;

    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    el.innerText = `Trajanje: ${formatTime(diff)}`;
  }
}, 1000);

// 🔄 refresh podataka
setInterval(loadMachines, 5000);

// 🟢 INIT
window.onload = () => {
  loadMachines();
  updateDateTime();
};

setInterval(updateDateTime, 1000);
</script>

</body>
</html>
