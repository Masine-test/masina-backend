<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 14px;
      color: gray;
    }

    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }
    .offline { color: gray; }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    .stats {
      font-size: 13px;
      margin-top: 10px;
      text-align: left;
    }

    .eff {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <div class="mb-3">
    <a href="/history.html" class="btn btn-primary">
      📅 Historija
    </a>
  </div>

  <h1>🏭 Sve mašine</h1>

  <div class="row" id="machines"></div>

  <!-- DATUM + SMJENA -->
  <div class="row mt-4 text-center">
    <h3 id="datetime"></h3>
    <h4 id="shift"></h4>
  </div>

</div>

<script>
const API = "/api/machines/all";
const STATS_API = "/api/shift-stats";

let startTimes = {};
let lastStates = {};

// =======================
// FORMAT VREMENA
// =======================
function formatTime(sec) {
  sec = Math.floor(sec || 0);

  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;

  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

// =======================
// BOJE
// =======================
function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}

function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}

// =======================
// SMJENA
// =======================
function getShift(hour) {
  if (hour >= 7 && hour < 16) return "I smjena (07-16h)";
  if (hour >= 16) return "II smjena (16-24h)";
  return "III smjena (00-07h)";
}

function updateDateTime() {
  const now = new Date();

  document.getElementById("datetime").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  document.getElementById("shift").innerText =
    getShift(now.getHours());
}

// =======================
// LOAD MAŠINE
// =======================
async function loadMachines() {
  const res = await fetch(API);
  const machines = await res.json();

  const statsRes = await fetch(STATS_API);
  const stats = await statsRes.json();

  const container = document.getElementById("machines");

  machines.forEach(m => {

    const s = stats[m.machine_id] || {
      RAD: 0,
      PRIPREMA: 0,
      ZASTOJ: 0,
      efficiency: 0
    };

    const rad = formatTime(s.RAD);
    const prep = formatTime(s.PRIPREMA);
    const zast = formatTime(s.ZASTOJ);
    const eff = s.efficiency || 0;

    let card = document.getElementById("card_" + m.machine_id);

    if (!card) {
      const div = document.createElement("div");
      div.className = "col-md-3";
      div.id = "card_" + m.machine_id;

      div.innerHTML = `
        <div class="card machine-card">
          <h3>${m.machine_id}</h3>

          <div class="status" id="s_${m.machine_id}"></div>
          <div id="st_${m.machine_id}"></div>
          <div class="timer" id="t_${m.machine_id}"></div>

          <div class="stats">
            🟢 RAD: <span id="rad_${m.machine_id}"></span><br>
            🟠 PRIPREMA: <span id="prep_${m.machine_id}"></span><br>
            🔴 ZASTOJ: <span id="zast_${m.machine_id}"></span>
          </div>

          <div class="eff" id="eff_${m.machine_id}"></div>
        </div>
      `;

      container.appendChild(div);
    }

    // STATUS
    const statusEl = document.getElementById("s_" + m.machine_id);
    statusEl.className = "status " + getClass(m.state, m.status);
    statusEl.innerText = getLabel(m.state, m.status);

    document.getElementById("st_" + m.machine_id).innerText = m.status;

    // STATS
    document.getElementById("rad_" + m.machine_id).innerText = rad;
    document.getElementById("prep_" + m.machine_id).innerText = prep;
    document.getElementById("zast_" + m.machine_id).innerText = zast;
    document.getElementById("eff_" + m.machine_id).innerText = `⚙️ ${eff}%`;

    // TIMER
    if (m.created_at) {
      if (lastStates[m.machine_id] !== (m.state + m.status)) {
        startTimes[m.machine_id] = new Date(m.created_at);
        lastStates[m.machine_id] = m.state + m.status;
      }
    }
  });
}

// =======================
// TIMER UPDATE
// =======================
setInterval(() => {
  for (let id in startTimes) {
    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);

    if (el) el.innerText = "Trajanje: " + formatTime(diff);
  }
}, 1000);

// =======================
// REFRESH
// =======================
setInterval(loadMachines, 5000);
setInterval(updateDateTime, 1000);

window.onload = () => {
  loadMachines();
  updateDateTime();
};
</script>

</body>
</html>
