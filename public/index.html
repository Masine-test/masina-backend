<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 16px;
      color: gray;
    }

    .offline { color: gray; }
    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <div class="mb-3 text-end">
    <a href="/history.html" class="btn btn-primary">
      📅 Historija
    </a>
  </div>

  <h1>🏭 Sve mašine</h1>

  <div class="row mb-3 text-center">
    <h3 id="datetime"></h3>
    <h4 id="shift"></h4>
  </div>

  <div class="row" id="machines"></div>

</div>

<script>
const API = "/api/machines/all";
const STATS_API = "/api/shift-stats";

let startTimes = {};
let lastStates = {};

// =======================
// FORMAT
// =======================
function formatTime(sec) {
  sec = Math.floor(sec || 0);

  let h = Math.floor(sec / 3600);
  let m = Math.floor((sec % 3600) / 60);
  let s = sec % 60;

  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

// =======================
// SMJENA
// =======================
function getShift(hour) {
  if (hour >= 7 && hour < 16) return "I smjena (07-16h)";
  if (hour >= 16) return "II smjena (16-24h)";
  return "III smjena (00-07h)";
}

// =======================
// DATETIME
// =======================
function updateDateTime() {
  const now = new Date();

  document.getElementById("datetime").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();

  document.getElementById("shift").innerText =
    getShift(now.getHours());
}

// =======================
// BOJA
// =======================
function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}

function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}

// =======================
// LOAD
// =======================
async function loadMachines() {
  const res = await fetch(API);
  const machines = await res.json();

  const statsRes = await fetch(STATS_API);
  const stats = await statsRes.json(); // ✅ FIX (bez .data)

  const container = document.getElementById("machines");

  machines.forEach(m => {

    const s = stats[m.machine_id] || {};

    const rad = formatTime(s.RAD || 0);
    const priprema = formatTime(s.PRIPREMA || 0);
    const zastoj = formatTime(s.ZASTOJ || 0);
    const eff = s.efficiency || 0;

    let card = document.getElementById("card_" + m.machine_id);

    if (!card) {
      const div = document.createElement("div");
      div.className = "col-md-3";
      div.id = "card_" + m.machine_id;

      div.innerHTML = `
        <div class="card machine-card">
          <h3>${m.machine_id}</h3>

          <div class="status" id="s_${m.machine_id}"></div>
          <div id="st_${m.machine_id}" style="font-size:12px;"></div>

          <div class="timer" id="t_${m.machine_id}"></div>

          <div style="font-size:13px; margin-top:10px;">
            🟢 RAD: ${rad}<br>
            🟠 PRIPREMA: ${priprema}<br>
            🔴 ZASTOJ: ${zastoj}
          </div>

          <div style="margin-top:10px; font-weight:bold;">
            ⚙️ Efikasnost: ${eff}%
          </div>
        </div>
      `;

      container.appendChild(div);
    }

    const statusEl = document.getElementById("s_" + m.machine_id);
    const labelEl = document.getElementById("st_" + m.machine_id);

    statusEl.className = "status " + getClass(m.state, m.status);
    statusEl.innerHTML = `<span>${getLabel(m.state, m.status)}</span>`;
    labelEl.innerText = m.status;

    // TIMER reset
    if (m.status !== "NEVER") {
      if (lastStates[m.machine_id] !== (m.state + m.status)) {
        startTimes[m.machine_id] = new Date(m.created_at || Date.now());
        lastStates[m.machine_id] = m.state + m.status;
      }
    }
  });
}

// =======================
// TIMER
// =======================
setInterval(() => {
  for (let id in startTimes) {
    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);
    if (el) el.innerText = "Trajanje: " + formatTime(diff);
  }
}, 1000);

// =======================
// INIT
// =======================
setInterval(loadMachines, 5000);
window.onload = loadMachines;

setInterval(updateDateTime, 1000);
updateDateTime();
</script>

</body>
</html>
