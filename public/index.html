<!DOCTYPE html>
<html>
<head>
  <title>Mašina Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h2 {
      margin-top: 20px;
    }

    #status {
      font-size: 22px;
      margin: 10px;
    }

    #alarm {
      font-size: 20px;
      margin: 10px;
      color: red;
      font-weight: bold;
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Dashboard mašine</h2>

<h3 id="status">Status: učitavanje...</h3>
<h3 id="alarm"></h3>

<canvas id="chart" width="400" height="200"></canvas>

<script>
const API_STATS = "/api/stats";
const API_LIVE = "/api/live";

let chart;

// 📊 GRAF
async function loadStats() {
  const res = await fetch(API_STATS);
  const data = await res.json();

  const labels = data.map(d => d.state);
  const values = data.map(d => Number(d.total_duration));

  const ctx = document.getElementById("chart");

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Ukupno vrijeme (s)",
        data: values
      }]
    }
  });
}

// 🟢 LIVE STATUS
async function loadLive() {
  const res = await fetch("/api/data");
  const data = await res.json();

  if (!data || data.length === 0) return;

  const current = data[0];   // najnoviji zapis
  const previous = data[1];  // prethodni zapis

  // 🎨 boje za trenutno stanje
  let color = "black";
  if (current.state === "RAD") color = "green";
  if (current.state === "ZASTOJ") color = "red";
  if (current.state === "PRIPREMA") color = "orange";

  // 🟢 trenutno stanje (bez trajanja)
  document.getElementById("status").innerHTML =
    `<span style="color:${color}">
      Trenutno stanje: ${current.state}
    </span>`;

  // ⏱️ prethodno stanje + trajanje
  if (previous) {
    document.getElementById("alarm").innerHTML =
      `Prethodno: ${previous.state} (${previous.duration}s)`;
  }

  // 🚨 alarm ako je prethodni bio dug zastoj
  if (previous && previous.state === "ZASTOJ" && previous.duration > 60) {
    document.getElementById("alarm").innerHTML +=
      `<br>⚠️ ALARM: Dug zastoj!`;
  }
}

// 🔄 AUTO REFRESH
setInterval(loadStats, 5000);
setInterval(loadLive, 2000);

// 🚀 START
window.onload = () => {
  loadStats();
  loadLive();
};
</script>

</body>
</html>
