<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 16px;
      color: gray;
    }

    .offline {
      color: gray;
    }

    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }

    /* 🔥 BLINK za OFFLINE */
    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <h1>🏭 Sve mašine</h1>

  <div class="row" id="machines"></div>

</div>
<script>
const API = "/api/machines/all";

let startTimes = {};
let lastStates = {};

// 🎯 BOJE
function getClass(state, status) {
  if (status === "OFFLINE") return "zastoj blink";
  if (status === "NEVER") return "offline";

  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";

  return "offline";
}

// 🎯 LABEL
function getLabel(state, status) {
  if (status === "OFFLINE") return "OFFLINE";
  if (status === "NEVER") return "NEVER";
  return state;
}

async function loadMachines() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("machines");
  container.innerHTML = "";

  data.forEach(m => {

    // 🔥 RESET TIMER NA PROMJENU (samo ako nije NEVER)
    if (m.status !== "NEVER") {
      if (lastStates[m.machine_id] !== (m.state + m.status)) {
        startTimes[m.machine_id] = new Date(m.last_seen || Date.now());
        lastStates[m.machine_id] = m.state + m.status;
      }
    }

    const div = document.createElement("div");
    div.className = "col-md-3";

    div.innerHTML = `
      <div class="card machine-card">
        <h3>${m.machine_id}</h3>

        <div class="status ${getClass(m.state, m.status)}">
          ${getLabel(m.state, m.status)}
        </div>

        <div style="font-size:12px; color:gray;">
          ${m.status}
        </div>

        ${
          m.status === "NEVER"
            ? `<div class="timer">N/A</div>`
            : `<div class="timer" id="t_${m.machine_id}">
  Trajanje: 0s
</div>`
        }
      </div>
    `;

    container.appendChild(div);
  });
}

// ⏱️ TIMER (radi samo za aktivne)
setInterval(() => {
  for (let id in startTimes) {
    if (!startTimes[id]) continue;

    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);

    if (el) el.innerText = `Trajanje: ${diff}s`;
  }
}, 1000);

// 🔄 refresh
setInterval(loadMachines, 5000);
window.onload = loadMachines;
</script>

</body>
</html>
