<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard mašina</title>

  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet"/>

  <style>
    .machine-card {
      text-align: center;
      padding: 20px;
    }

    .status {
      font-size: 22px;
      font-weight: bold;
    }

    .timer {
      font-size: 16px;
      color: gray;
    }

    .offline {
      color: gray;
    }

    .rad { color: green; }
    .zastoj { color: red; }
    .priprema { color: orange; }
  </style>
</head>

<body class="layout-fluid">

<div class="container-xl mt-4">

  <h1>🏭 Sve mašine</h1>

  <div class="row" id="machines"></div>

</div>

<script>
const API = "/api/machines";

let startTimes = {};

function getClass(state) {
  if (state === "RAD") return "rad";
  if (state === "ZASTOJ") return "zastoj";
  if (state === "PRIPREMA") return "priprema";
  return "offline";
}

async function loadMachines() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("machines");
  container.innerHTML = "";

  data.forEach(m => {

    if (!startTimes[m.machine_id]) {
      startTimes[m.machine_id] = new Date(m.created_at);
    }

    const div = document.createElement("div");
    div.className = "col-md-3";

    div.innerHTML = `
      <div class="card machine-card">
        <h3>${m.machine_id}</h3>
        <div class="status ${getClass(m.state)}">
          ${m.state}
        </div>
        <div class="timer" id="t_${m.machine_id}"></div>
      </div>
    `;

    container.appendChild(div);
  });
}

// ⏱️ timer update
setInterval(() => {
  for (let id in startTimes) {
    const diff = Math.floor((new Date() - startTimes[id]) / 1000);
    const el = document.getElementById("t_" + id);
    if (el) el.innerText = `Trajanje: ${diff}s`;
  }
}, 1000);

setInterval(loadMachines, 5000);
window.onload = loadMachines;
</script>

</body>
</html>
